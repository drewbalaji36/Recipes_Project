{% extends "base.html" %}
{% block content %}
<h1>Bulk bump spice by country</h1>
<form method="post">
  {% csrf_token %}
  <label for="country">Country:</label>
  <select name="country" id="country" required>
    <option value="" disabled selected>— Choose a country —</option>
    {% for c in countries %}
      <option value="{{ c }}">{{ c }}</option>
    {% endfor %}
  </select>
  <button type="submit">Bump spice +1 (max 5)</button>
  <a href="{% url 'recipes:list' %}">Cancel</a>
</form>
{% endblock %}
